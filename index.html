<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CaoCao</title>
<link rel="icon" type="image/x-icon" href="./favicon.ico">
<link rel="icon" type="image/svg+xml" href="./favicon.svg">
<link rel="icon" type="image/png" sizes="96x96" href="./favicon-96x96.png">
<link rel="apple-touch-icon" sizes="180x180" href="./apple-touch-icon.png">
<link rel="manifest" href="./site.webmanifest">
<script>
  const saved = localStorage.getItem('theme');
  if (saved === 'dark') document.documentElement.classList.add('dark');
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,wght@0,400;0,500;0,700;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: oklch(0.98 0.008 65);
    --bg-alt: oklch(0.94 0.012 65);
    --fg: oklch(0.18 0.01 55);
    --fg-muted: oklch(0.45 0.015 55);
    --accent: oklch(0.62 0.14 45);
    --accent-hover: oklch(0.55 0.16 45);
    --border: oklch(0.88 0.012 65);
    --tag-bg: oklch(0.93 0.02 55);
    --tag-fg: oklch(0.42 0.04 55);
    --font-sans: 'DM Sans', system-ui, sans-serif;
    --font-mono: 'DM Mono', monospace;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  :root.dark {
    --bg: oklch(0.15 0.01 55);
    --bg-alt: oklch(0.19 0.012 55);
    --fg: oklch(0.92 0.008 65);
    --fg-muted: oklch(0.60 0.015 65);
    --accent: oklch(0.72 0.14 45);
    --accent-hover: oklch(0.78 0.12 45);
    --border: oklch(0.28 0.015 55);
    --tag-bg: oklch(0.24 0.02 55);
    --tag-fg: oklch(0.72 0.03 55);
  }

  body {
    font-family: var(--font-sans);
    background: var(--bg);
    color: var(--fg);
    transition: background var(--transition), color var(--transition);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .container {
    max-width: 780px;
    margin: 0 auto;
    padding: 60px 32px 100px;
  }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 64px;
  }

  .header h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.03em;
    line-height: 1.2;
  }

  .header .subtitle {
    margin-top: 6px;
    color: var(--fg-muted);
    font-size: 15px;
    font-family: var(--font-mono);
  }

  .theme-toggle {
    background: none;
    border: 1.5px solid var(--border);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    padding: 0;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    display: grid;
    place-items: center;
    color: var(--fg);
    transition: all var(--transition);
    flex-shrink: 0;
  }

  .theme-toggle .icon {
    display: block;
    width: 18px;
    height: 18px;
    color: currentColor;
  }

  .theme-toggle .icon-moon {
    width: 24px;
    height: 24px;
  }

  .theme-toggle:hover {
    border-color: var(--accent);
  }

  .theme-toggle .icon-sun { display: none; }
  .theme-toggle .icon-moon { display: block; }
  :root.dark .theme-toggle .icon-sun { display: block; }
  :root.dark .theme-toggle .icon-moon { display: none; }

  /* Projects */
  .projects {
    border-top: 1px solid var(--border);
  }

  .project {
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
    transition: all var(--transition);
    cursor: pointer;
  }

  .project-header {
    display: flex;
    align-items: baseline;
    gap: 12px;
    flex-wrap: wrap;
  }

  .project-number {
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg-muted);
    min-width: 24px;
  }

  .project-name {
    font-weight: 700;
    font-size: 22px;
    text-decoration: none;
    color: var(--fg);
    transition: color var(--transition);
    letter-spacing: -0.02em;
  }

  .project:hover .project-name {
    color: var(--accent);
  }

  .project-lang {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 13px;
    color: var(--fg-muted);
  }

  .lang-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    display: inline-block;
    flex-shrink: 0;
  }

  .expand-arrow {
    margin-left: auto;
    font-size: 14px;
    color: var(--fg-muted);
    transition: transform var(--transition);
    user-select: none;
  }

  .project.expanded .expand-arrow {
    transform: rotate(180deg);
  }

  .project-desc {
    margin-top: 8px;
    margin-left: 36px;
    color: var(--fg-muted);
    font-size: 15px;
    line-height: 1.6;
    max-width: 640px;
    text-wrap: pretty;
  }

  /* Expandable details */
  .project-details {
    max-height: 0;
    overflow: hidden;
    opacity: 0;
    margin-left: 36px;
    margin-top: 0;
    transition:
      max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1),
      opacity 0.4s cubic-bezier(0.4, 0, 0.2, 1),
      margin-top 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  .project.expanded .project-details {
    max-height: 300px;
    opacity: 1;
    margin-top: 16px;
  }

  .project-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 14px;
  }

  .tag {
    background: var(--tag-bg);
    color: var(--tag-fg);
    font-size: 12px;
    font-family: var(--font-mono);
    padding: 4px 10px;
    border-radius: 4px;
    transition: all var(--transition);
  }

  .project-features {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .project-features li {
    font-size: 14px;
    color: var(--fg-muted);
    padding-left: 16px;
    position: relative;
  }

  .project-features li::before {
    content: '\00B7';
    position: absolute;
    left: 0;
    color: var(--accent);
    font-weight: 700;
  }

  .projects-status {
    padding: 28px 0;
    border-bottom: 1px solid var(--border);
    color: var(--fg-muted);
    font-size: 15px;
    line-height: 1.6;
  }

  /* Footer */
  .footer {
    margin-top: 48px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    color: var(--fg-muted);
    font-size: 13px;
    font-family: var(--font-mono);
  }

  .footer a {
    color: var(--fg-muted);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: all var(--transition);
  }

  .footer a:hover {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }
</style>
</head>
<body>
<div class="container">
  <header class="header">
    <div>
      <h1>CaoCao</h1>
      <p class="subtitle">projects</p>
    </div>
    <button class="theme-toggle" aria-label="Toggle dark mode">
      <svg class="icon icon-moon" viewBox="0 0 24 24" aria-hidden="true">
        <defs>
          <mask id="theme-moon-mask">
            <rect width="24" height="24" fill="white"></rect>
            <circle cx="16.7" cy="10.1" r="6.8" fill="black"></circle>
          </mask>
        </defs>
        <circle cx="12.5" cy="12" r="7.8" fill="currentColor" mask="url(#theme-moon-mask)"></circle>
      </svg>
      <svg class="icon icon-sun" viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="4.25" fill="currentColor"></circle>
        <g stroke="currentColor" stroke-linecap="round" stroke-width="1.8">
          <line x1="12" y1="2.5" x2="12" y2="5"></line>
          <line x1="12" y1="19" x2="12" y2="21.5"></line>
          <line x1="2.5" y1="12" x2="5" y2="12"></line>
          <line x1="19" y1="12" x2="21.5" y2="12"></line>
          <line x1="5.28" y1="5.28" x2="7.05" y2="7.05"></line>
          <line x1="16.95" y1="16.95" x2="18.72" y2="18.72"></line>
          <line x1="16.95" y1="7.05" x2="18.72" y2="5.28"></line>
          <line x1="5.28" y1="18.72" x2="7.05" y2="16.95"></line>
        </g>
      </svg>
    </button>
  </header>

  <div class="projects" id="projects-list">
    <p class="projects-status">Loading projects...</p>
  </div>

  <footer class="footer">
    <a href="https://github.com/caocaochan" target="_blank" rel="noopener noreferrer">github.com/caocaochan</a>
    <span>2026</span>
  </footer>
</div>

<script>
  var projectsList = document.getElementById('projects-list');

  document.querySelector('.theme-toggle').addEventListener('click', function () {
    var isDark = document.documentElement.classList.toggle('dark');
    localStorage.setItem('theme', isDark ? 'dark' : 'light');
  });

  function createElement(tagName, className, text) {
    var el = document.createElement(tagName);
    if (className) el.className = className;
    if (text !== undefined) el.textContent = text;
    return el;
  }

  function formatProjectNumber(index) {
    return String(index + 1).padStart(2, '0');
  }

  function renderProject(project, index) {
    var article = createElement('div', 'project');
    article.addEventListener('click', function (event) {
      toggleProject(article, event);
    });

    var header = createElement('div', 'project-header');

    header.appendChild(createElement('span', 'project-number', formatProjectNumber(index)));

    var nameLink = createElement('a', 'project-name', project.name);
    nameLink.href = project.url;
    nameLink.target = '_blank';
    nameLink.rel = 'noopener noreferrer';
    header.appendChild(nameLink);

    var lang = createElement('span', 'project-lang');
    var langDot = createElement('span', 'lang-dot');
    langDot.style.background = project.languageColor;
    lang.appendChild(langDot);
    lang.appendChild(document.createTextNode(project.language));
    header.appendChild(lang);

    header.appendChild(createElement('span', 'expand-arrow', '\u25BE'));
    article.appendChild(header);

    article.appendChild(createElement('p', 'project-desc', project.description));

    var details = createElement('div', 'project-details');

    var tags = createElement('div', 'project-tags');
    project.tags.forEach(function (tag) {
      tags.appendChild(createElement('span', 'tag', tag));
    });
    details.appendChild(tags);

    var features = createElement('ul', 'project-features');
    project.features.forEach(function (feature) {
      features.appendChild(createElement('li', '', feature));
    });
    details.appendChild(features);

    article.appendChild(details);
    return article;
  }

  function renderProjects(projects) {
    projectsList.replaceChildren();

    if (!Array.isArray(projects) || projects.length === 0) {
      projectsList.appendChild(createElement('p', 'projects-status', 'No projects yet.'));
      return;
    }

    projects.forEach(function (project, index) {
      projectsList.appendChild(renderProject(project, index));
    });
  }

  function showProjectsError(message) {
    projectsList.replaceChildren(createElement('p', 'projects-status', message));
  }

  async function loadProjects() {
    try {
      var response = await fetch('./projects.json', { cache: 'no-store' });
      if (!response.ok) {
        throw new Error('HTTP ' + response.status);
      }

      var projects = await response.json();
      if (!Array.isArray(projects)) {
        throw new Error('Invalid projects format');
      }

      renderProjects(projects);
    } catch (error) {
      showProjectsError('Projects could not be loaded right now. Please try again later.');
      console.error('Failed to load projects:', error);
    }
  }

  function toggleProject(el, e) {
    if (e.target.closest('a')) return;
    el.classList.toggle('expanded');
  }

  loadProjects();
</script>
</body>
</html>
